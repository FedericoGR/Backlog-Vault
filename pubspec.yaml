name: backlog_vault
description: Backlog Vault is a local-first personal video game backlog manager.
publish_to: "none"
version: 0.1.0+3

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  flutter_riverpod: ^3.0.3
  go_router: ^17.0.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  file_picker: 11.0.2
  csv: 8.0.0
  data_table_2: ^2.7.2
  http: ^1.6.0
  flutter_secure_storage: ^10.3.1
  crypto: ^3.0.7
  archive: ^4.0.9
  cryptography: ^2.9.0
  shared_preferences: ^2.5.3

dev_dependencies:
  build_runner: ^2.10.4
  drift_dev: ^2.33.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  test: ^1.26.3

dependency_overrides:
  flutter_secure_storage_windows:
    path: third_party/flutter_secure_storage_windows

flutter:
  generate: true
  uses-material-design: true
